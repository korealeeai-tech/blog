<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI 코딩 에이전트 완료 기준 개념도</title>
  <desc id="desc">AI가 만든 결과를 변경, 검증 증거, 사람 검토, 인수인계 가능 상태로 나누어 완료를 판단하는 흐름</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="52%" stop-color="#edf7f3"/>
      <stop offset="100%" stop-color="#fff8ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M2,2 L14,8 L2,14 Z" fill="#46617a"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1040" cy="96" r="58" fill="#f7c948" opacity="0.25"/>
  <circle cx="150" cy="560" r="86" fill="#5b8def" opacity="0.16"/>

  <text x="80" y="88" fill="#172033" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="42" font-weight="800">
    AI 코딩 에이전트의 완료는 말이 아니라 증거다
  </text>
  <text x="82" y="128" fill="#516174" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20">
    결과물이 생긴 상태와 사람이 넘겨받아도 되는 상태를 분리해서 본다.
  </text>

  <g filter="url(#shadow)">
    <rect x="82" y="205" width="205" height="142" rx="24" fill="#ffffff"/>
    <rect x="343" y="205" width="205" height="142" rx="24" fill="#ffffff"/>
    <rect x="604" y="205" width="205" height="142" rx="24" fill="#ffffff"/>
    <rect x="865" y="205" width="205" height="142" rx="24" fill="#ffffff"/>
  </g>

  <g font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">
    <text x="122" y="257" fill="#0f766e" font-size="24" font-weight="800">1. 변경</text>
    <text x="122" y="294" fill="#334155" font-size="18">요구한 코드나 문서가</text>
    <text x="122" y="320" fill="#334155" font-size="18">실제로 바뀌었는가</text>

    <text x="383" y="257" fill="#1d4ed8" font-size="24" font-weight="800">2. 검증</text>
    <text x="383" y="294" fill="#334155" font-size="18">테스트, 빌드, 로그가</text>
    <text x="383" y="320" fill="#334155" font-size="18">근거로 남았는가</text>

    <text x="644" y="257" fill="#b45309" font-size="24" font-weight="800">3. 검토</text>
    <text x="644" y="294" fill="#334155" font-size="18">사람이 위험과 한계를</text>
    <text x="644" y="320" fill="#334155" font-size="18">판단할 수 있는가</text>

    <text x="905" y="257" fill="#be123c" font-size="24" font-weight="800">4. 인계</text>
    <text x="905" y="294" fill="#334155" font-size="18">다음 사람이 이어서</text>
    <text x="905" y="320" fill="#334155" font-size="18">확인할 수 있는가</text>
  </g>

  <path d="M294 276 H332" stroke="#46617a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M555 276 H593" stroke="#46617a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M816 276 H854" stroke="#46617a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="170" y="425" width="860" height="112" rx="28" fill="#172033"/>
  </g>
  <text x="220" y="474" fill="#ffffff" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="24" font-weight="800">
    완료 보고에 필요한 최소 문장
  </text>
  <text x="220" y="512" fill="#dbeafe" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="21">
    무엇을 바꿨고, 무엇으로 확인했고, 무엇은 아직 확인하지 못했는가
  </text>

  <g font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="16" fill="#64748b">
    <text x="82" y="623">개념도: 실제 도구 화면이나 특정 프로젝트 구조가 아니라, 완료 판단 기준을 단순화한 그림이다.</text>
  </g>
</svg>
