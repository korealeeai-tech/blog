<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Doc-first AI 코딩 흐름</title>
  <desc id="desc">문서 확인, 기존 패턴, 작업 계약, 코드 수정, 검증으로 이어지는 흐름</desc>
  <rect width="1200" height="675" fill="#f5f7fb"/>
  <text x="90" y="105" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="40" font-weight="800" fill="#1f2937">코드부터 고치지 않고 문서부터 읽힌다</text>
  <text x="90" y="144" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#5b6472">AI가 손대기 전에 기준과 맥락을 먼저 좁혀야 수정이 덜 흔들린다.</text>
  <g transform="translate(85 230)">
    <rect width="190" height="150" rx="18" fill="#ffffff" stroke="#8bb5e0" stroke-width="2"/>
    <text x="95" y="58" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="24" font-weight="800" fill="#1d4f8c">문서 확인</text>
    <text x="95" y="98" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="17" fill="#40566f">공식 문서</text>
    <text x="95" y="124" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="17" fill="#40566f">프로젝트 규칙</text>
  </g>
  <g transform="translate(315 230)">
    <rect width="190" height="150" rx="18" fill="#ffffff" stroke="#91c788" stroke-width="2"/>
    <text x="95" y="58" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="24" font-weight="800" fill="#2f6b2f">기존 패턴</text>
    <text x="95" y="98" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="17" fill="#466144">주변 구현</text>
    <text x="95" y="124" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="17" fill="#466144">관례 확인</text>
  </g>
  <g transform="translate(545 230)">
    <rect width="190" height="150" rx="18" fill="#ffffff" stroke="#e0b15b" stroke-width="2"/>
    <text x="95" y="58" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="24" font-weight="800" fill="#895c10">작업 계약</text>
    <text x="95" y="98" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="17" fill="#6b551f">성공 기준</text>
    <text x="95" y="124" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="17" fill="#6b551f">제외 범위</text>
  </g>
  <g transform="translate(775 230)">
    <rect width="190" height="150" rx="18" fill="#ffffff" stroke="#d78c92" stroke-width="2"/>
    <text x="95" y="58" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="24" font-weight="800" fill="#8a343d">코드 수정</text>
    <text x="95" y="98" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="17" fill="#6a4247">작게 변경</text>
    <text x="95" y="124" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="17" fill="#6a4247">diff 확인</text>
  </g>
  <g transform="translate(1005 230)">
    <rect width="110" height="150" rx="18" fill="#ffffff" stroke="#9c8fd6" stroke-width="2"/>
    <text x="55" y="58" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="24" font-weight="800" fill="#574798">검증</text>
    <text x="55" y="98" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="17" fill="#554b77">빌드</text>
    <text x="55" y="124" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="17" fill="#554b77">근거</text>
  </g>
  <g stroke="#6b7280" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M275 305 H315"/>
    <path d="M505 305 H545"/>
    <path d="M735 305 H775"/>
    <path d="M965 305 H1005"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect x="150" y="475" width="900" height="78" rx="14" fill="#ffffff" stroke="#d8dee9"/>
  <text x="600" y="506" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="20" font-weight="700" fill="#1f2937">문서를 먼저 읽히는 목적은 속도를 늦추는 것이 아니다</text>
  <text x="600" y="536" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="18" fill="#5b6472">수정 전에 AI가 추측해야 하는 영역을 줄이는 것이다.</text>
</svg>
