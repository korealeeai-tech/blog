<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI 작업 실패를 네 가지로 분류하는 개념도</title>
  <desc id="desc">AI 작업 실패를 버그, 누락, 오해, 검증 실패로 나누어 다음 대응을 정하는 흐름</desc>
  <rect width="1600" height="900" fill="#f6f8fb"/>
  <rect x="86" y="76" width="1428" height="748" rx="30" fill="#ffffff" stroke="#d8e0e9" stroke-width="2"/>
  <text x="140" y="160" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="52" font-weight="800" fill="#17202a">AI 작업 실패는 한 단어로 묶지 않는다</text>
  <text x="140" y="214" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="25" fill="#52616b">버그, 누락, 오해, 검증 실패를 분리해야 다음 조치가 선명해진다</text>

  <g transform="translate(140 300)">
    <rect width="300" height="260" rx="20" fill="#fff1f2" stroke="#f1b8bf" stroke-width="2"/>
    <circle cx="58" cy="58" r="28" fill="#ef4444"/>
    <text x="58" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">1</text>
    <text x="104" y="68" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="31" font-weight="800" fill="#7f1d1d">버그</text>
    <text x="36" y="130" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="22" fill="#3b2b2b">만든 것이 실제로</text>
    <text x="36" y="166" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="22" fill="#3b2b2b">깨져 있거나 다르게 돈다</text>
    <line x1="36" y1="198" x2="264" y2="198" stroke="#f1b8bf" stroke-width="2"/>
    <text x="36" y="234" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="21" fill="#7f1d1d">테스트와 재현부터</text>
  </g>

  <g transform="translate(480 300)">
    <rect width="300" height="260" rx="20" fill="#fff7ed" stroke="#e9c59c" stroke-width="2"/>
    <circle cx="58" cy="58" r="28" fill="#f97316"/>
    <text x="58" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">2</text>
    <text x="104" y="68" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="31" font-weight="800" fill="#7c2d12">누락</text>
    <text x="36" y="130" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="22" fill="#3f3223">해야 할 일을 일부</text>
    <text x="36" y="166" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="22" fill="#3f3223">하지 않고 지나갔다</text>
    <line x1="36" y1="198" x2="264" y2="198" stroke="#e9c59c" stroke-width="2"/>
    <text x="36" y="234" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="21" fill="#7c2d12">체크리스트와 gate로</text>
  </g>

  <g transform="translate(820 300)">
    <rect width="300" height="260" rx="20" fill="#eef6ff" stroke="#b8d4f2" stroke-width="2"/>
    <circle cx="58" cy="58" r="28" fill="#2563eb"/>
    <text x="58" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">3</text>
    <text x="104" y="68" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="31" font-weight="800" fill="#1d4f8f">오해</text>
    <text x="36" y="130" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="22" fill="#28394d">요청의 의미나</text>
    <text x="36" y="166" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="22" fill="#28394d">성공 기준을 잘못 잡았다</text>
    <line x1="36" y1="198" x2="264" y2="198" stroke="#b8d4f2" stroke-width="2"/>
    <text x="36" y="234" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="21" fill="#1d4f8f">계약을 다시 맞춘다</text>
  </g>

  <g transform="translate(1160 300)">
    <rect width="300" height="260" rx="20" fill="#ecfdf5" stroke="#a9d9c4" stroke-width="2"/>
    <circle cx="58" cy="58" r="28" fill="#059669"/>
    <text x="58" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">4</text>
    <text x="104" y="68" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="31" font-weight="800" fill="#14532d">검증 실패</text>
    <text x="36" y="130" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="22" fill="#243b32">완료라고 말할</text>
    <text x="36" y="166" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="22" fill="#243b32">근거가 부족했다</text>
    <line x1="36" y1="198" x2="264" y2="198" stroke="#a9d9c4" stroke-width="2"/>
    <text x="36" y="234" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="21" fill="#14532d">증거를 다시 모은다</text>
  </g>

  <rect x="180" y="650" width="1240" height="96" rx="22" fill="#17202a"/>
  <text x="800" y="693" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="27" font-weight="800" fill="#ffffff">실패 유형을 나누면 다음 프롬프트가 달라진다</text>
  <text x="800" y="731" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="22" fill="#cbd5df">고쳐라, 빠진 걸 채워라, 다시 물어라, 검증해라를 구분한다</text>
</svg>
