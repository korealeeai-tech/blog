<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Codex와 Claude 역할 분리 개념도</title>
  <desc id="desc">구현 라인, 독립 검토 라인, 사람 결정 게이트를 나눈 공개용 개념도.</desc>
  <rect width="1600" height="900" fill="#f7f4ef"/>
  <rect x="88" y="90" width="1424" height="720" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
  <text x="120" y="168" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#111827">AI 코딩 에이전트는 역할을 나눠야 한다</text>
  <text x="122" y="220" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="28" fill="#4b5563">한쪽은 실행하고, 다른 쪽은 가정을 점검하고, 사람은 결정을 맡는다.</text>

  <rect x="150" y="305" width="360" height="280" rx="20" fill="#e8f3ee" stroke="#2f6f5f" stroke-width="3"/>
  <text x="190" y="370" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#17483d">Codex 라인</text>
  <text x="190" y="425" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="26" fill="#24483f">구현</text>
  <text x="190" y="465" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="26" fill="#24483f">파일 수정</text>
  <text x="190" y="505" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="26" fill="#24483f">검증 실행</text>

  <rect x="620" y="305" width="360" height="280" rx="20" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
  <text x="660" y="370" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#312e81">Claude 라인</text>
  <text x="660" y="425" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="26" fill="#3730a3">계획 반박</text>
  <text x="660" y="465" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="26" fill="#3730a3">빈틈 찾기</text>
  <text x="660" y="505" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="26" fill="#3730a3">선택 기준 검토</text>

  <rect x="1090" y="305" width="360" height="280" rx="20" fill="#fff7ed" stroke="#c2410c" stroke-width="3"/>
  <text x="1130" y="370" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#7c2d12">사람 결정</text>
  <text x="1130" y="425" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="26" fill="#7c2d12">범위 선택</text>
  <text x="1130" y="465" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="26" fill="#7c2d12">위험 수용</text>
  <text x="1130" y="505" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="26" fill="#7c2d12">발행 또는 중단</text>

  <path d="M520 445 H600" stroke="#374151" stroke-width="7" stroke-linecap="round"/>
  <path d="M590 425 L620 445 L590 465" fill="none" stroke="#374151" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M990 445 H1070" stroke="#374151" stroke-width="7" stroke-linecap="round"/>
  <path d="M1060 425 L1090 445 L1060 465" fill="none" stroke="#374151" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="230" y="668" width="1140" height="70" rx="35" fill="#111827"/>
  <text x="292" y="713" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="28" fill="#ffffff">원칙: 한 에이전트에게 주장과 감사를 동시에 맡기지 않는다.</text>
</svg>
