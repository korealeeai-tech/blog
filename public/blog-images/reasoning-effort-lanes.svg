<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">작업 난이도별 reasoning effort 분리 개념도</title>
  <desc id="desc">작은 수정, 보통 작업, 깊은 판단 작업을 서로 다른 사고 깊이로 나누는 개념도</desc>
  <rect width="1200" height="675" fill="#f7f4ee"/>
  <rect x="70" y="72" width="1060" height="530" rx="22" fill="#ffffff" stroke="#d8d2c7" stroke-width="2"/>
  <text x="100" y="126" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="38" font-weight="800" fill="#202124">reasoning effort는 작업 크기에 맞춘다</text>
  <text x="100" y="164" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="20" fill="#5f6368">항상 높게 쓰는 대신, 실패 비용과 판단 난이도에 따라 사고량을 조절한다.</text>
  <g transform="translate(100 225)">
    <rect width="290" height="260" rx="18" fill="#eaf4f4" stroke="#7ab8b3" stroke-width="2"/>
    <circle cx="52" cy="54" r="23" fill="#007f7a"/>
    <text x="52" y="63" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">1</text>
    <text x="92" y="58" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="26" font-weight="800" fill="#183836">빠른 작업</text>
    <text x="30" y="112" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="19" fill="#254744">문구 보정</text>
    <text x="30" y="146" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="19" fill="#254744">작은 조회</text>
    <text x="30" y="180" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="19" fill="#254744">낮은 위험 수정</text>
    <line x1="30" y1="206" x2="260" y2="206" stroke="#a8d4d0"/>
    <text x="30" y="237" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="18" font-weight="700" fill="#007f7a">목표: 빠르게 끝내고 확인</text>
  </g>
  <g transform="translate(455 225)">
    <rect width="290" height="260" rx="18" fill="#fff6de" stroke="#d9a441" stroke-width="2"/>
    <circle cx="52" cy="54" r="23" fill="#b26a00"/>
    <text x="52" y="63" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">2</text>
    <text x="92" y="58" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="26" font-weight="800" fill="#4b3510">보통 작업</text>
    <text x="30" y="112" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="19" fill="#5b4216">글 작성</text>
    <text x="30" y="146" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="19" fill="#5b4216">작은 기능 변경</text>
    <text x="30" y="180" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="19" fill="#5b4216">근거 확인 필요</text>
    <line x1="30" y1="206" x2="260" y2="206" stroke="#ebc874"/>
    <text x="30" y="237" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="18" font-weight="700" fill="#9a5f00">목표: 근거와 검증 균형</text>
  </g>
  <g transform="translate(810 225)">
    <rect width="290" height="260" rx="18" fill="#f1ecff" stroke="#9d88d8" stroke-width="2"/>
    <circle cx="52" cy="54" r="23" fill="#6750a4"/>
    <text x="52" y="63" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">3</text>
    <text x="92" y="58" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="26" font-weight="800" fill="#32245e">깊은 판단</text>
    <text x="30" y="112" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="19" fill="#44356c">설계 비교</text>
    <text x="30" y="146" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="19" fill="#44356c">고위험 변경</text>
    <text x="30" y="180" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="19" fill="#44356c">반례 검토</text>
    <line x1="30" y1="206" x2="260" y2="206" stroke="#c4b7eb"/>
    <text x="30" y="237" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="18" font-weight="700" fill="#6750a4">목표: 실수 비용 줄이기</text>
  </g>
  <path d="M180 540 C335 568, 518 568, 675 540 C820 510, 958 510, 1068 540" fill="none" stroke="#5f6368" stroke-width="3" stroke-dasharray="10 10"/>
  <rect x="360" y="560" width="480" height="32" rx="16" fill="#ffffff"/>
  <text x="600" y="582" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="18" fill="#5f6368">작업이 커질수록 사고량보다 검증 기준을 먼저 키운다</text>
</svg>
