<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <rect width="1400" height="760" fill="#f7f9fc"/>
  <text x="80" y="95" font-family="Noto Sans CJK KR, sans-serif" font-size="48" font-weight="700" fill="#172033">세컨드브레인이 아닌 것</text>
  <g font-family="Noto Sans CJK KR, sans-serif">
    <rect x="90" y="165" width="360" height="410" rx="28" fill="#fff2f2" stroke="#cf5c5c" stroke-width="3"/>
    <text x="270" y="235" text-anchor="middle" font-size="32" font-weight="700" fill="#6f2525">대화 저장소 아님</text>
    <text x="270" y="298" text-anchor="middle" font-size="24" fill="#172033">원문 수집이</text>
    <text x="270" y="340" text-anchor="middle" font-size="24" fill="#172033">목표가 아니다</text>
    <rect x="520" y="165" width="360" height="410" rx="28" fill="#fff8e8" stroke="#dca43a" stroke-width="3"/>
    <text x="700" y="235" text-anchor="middle" font-size="32" font-weight="700" fill="#5a3b00">사용자 단정 아님</text>
    <text x="700" y="298" text-anchor="middle" font-size="24" fill="#172033">기억이 사용자를</text>
    <text x="700" y="340" text-anchor="middle" font-size="24" fill="#172033">고정하면 안 된다</text>
    <rect x="950" y="165" width="360" height="410" rx="28" fill="#f1f6ff" stroke="#4b79d8" stroke-width="3"/>
    <text x="1130" y="235" text-anchor="middle" font-size="32" font-weight="700" fill="#173563">자동 조종 아님</text>
    <text x="1130" y="298" text-anchor="middle" font-size="24" fill="#172033">기준은 현재 판단을</text>
    <text x="1130" y="340" text-anchor="middle" font-size="24" fill="#172033">도울 뿐이다</text>
    <rect x="370" y="620" width="660" height="70" rx="20" fill="#172033"/>
    <text x="700" y="665" text-anchor="middle" font-size="27" font-weight="700" fill="#ffffff">세컨드브레인은 판단 기준 라이브러리다</text>
  </g>
</svg>
