<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800">
  <rect width="1600" height="800" fill="#f7f9fc"/>
  <rect x="80" y="70" width="1440" height="660" rx="36" fill="#ffffff" stroke="#d7deea" stroke-width="3"/>
  <text x="130" y="145" font-family="Noto Sans CJK KR, sans-serif" font-size="52" font-weight="700" fill="#172033">의도를 매번 새로 추측하는 반복</text>
  <text x="132" y="198" font-family="Noto Sans CJK KR, sans-serif" font-size="25" fill="#526173">최근 요청만 보이면 같은 작업 기준을 계속 다시 설명해야 한다.</text>
  <defs>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto">
      <path d="M2,2 L16,9 L2,16 Z" fill="#526173"/>
    </marker>
  </defs>
  <g font-family="Noto Sans CJK KR, sans-serif">
    <rect x="135" y="330" width="250" height="130" rx="22" fill="#f1f6ff" stroke="#4b79d8" stroke-width="3"/>
    <text x="260" y="382" text-anchor="middle" font-size="31" font-weight="700" fill="#173563">사용자 요청</text>
    <text x="260" y="424" text-anchor="middle" font-size="20" fill="#49617f">보이는 문장 하나</text>
    <rect x="485" y="330" width="250" height="130" rx="22" fill="#fff8e8" stroke="#dca43a" stroke-width="3"/>
    <text x="610" y="382" text-anchor="middle" font-size="31" font-weight="700" fill="#5a3b00">인공지능 추측</text>
    <text x="610" y="424" text-anchor="middle" font-size="20" fill="#705427">빠진 기준 추론</text>
    <rect x="835" y="330" width="250" height="130" rx="22" fill="#f3fbf4" stroke="#57a86d" stroke-width="3"/>
    <text x="960" y="382" text-anchor="middle" font-size="31" font-weight="700" fill="#23582e">일반 답변</text>
    <text x="960" y="424" text-anchor="middle" font-size="20" fill="#467451">그럴듯하지만 어긋남</text>
    <rect x="1185" y="330" width="250" height="130" rx="22" fill="#fff2f2" stroke="#cf5c5c" stroke-width="3"/>
    <text x="1310" y="382" text-anchor="middle" font-size="31" font-weight="700" fill="#6f2525">사용자 정정</text>
    <text x="1310" y="424" text-anchor="middle" font-size="20" fill="#7c4b4b">같은 기준 반복</text>
    <path d="M390 395 H468" stroke="#526173" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
    <path d="M740 395 H818" stroke="#526173" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
    <path d="M1090 395 H1168" stroke="#526173" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
    <path d="M1310 476 C1310 610 260 610 260 480" stroke="#526173" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
  </g>
  <text x="800" y="675" text-anchor="middle" font-family="Noto Sans CJK KR, sans-serif" font-size="30" fill="#172033">해결책은 프롬프트를 매번 늘리는 것이 아니라, 판단 기준을 재사용하는 것이다.</text>
</svg>
