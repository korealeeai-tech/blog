<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800">
  <rect width="1600" height="800" fill="#f7f9fc"/>
  <rect x="80" y="70" width="1440" height="660" rx="36" fill="#ffffff" stroke="#d7deea" stroke-width="3"/>
  <text x="130" y="145" font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="#172033">The repeated intent guessing loop</text>
  <text x="132" y="198" font-family="Arial, sans-serif" font-size="25" fill="#526173">When only the latest prompt is visible, the same operating preferences must be explained again.</text>
  <defs>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto">
      <path d="M2,2 L16,9 L2,16 Z" fill="#526173"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <rect x="135" y="330" width="250" height="130" rx="22" fill="#f1f6ff" stroke="#4b79d8" stroke-width="3"/>
    <text x="260" y="382" text-anchor="middle" font-size="31" font-weight="700" fill="#173563">User request</text>
    <text x="260" y="424" text-anchor="middle" font-size="20" fill="#49617f">one visible prompt</text>
    <rect x="485" y="330" width="250" height="130" rx="22" fill="#fff8e8" stroke="#dca43a" stroke-width="3"/>
    <text x="610" y="382" text-anchor="middle" font-size="31" font-weight="700" fill="#5a3b00">AI guess</text>
    <text x="610" y="424" text-anchor="middle" font-size="20" fill="#705427">missing preferences</text>
    <rect x="835" y="330" width="250" height="130" rx="22" fill="#f3fbf4" stroke="#57a86d" stroke-width="3"/>
    <text x="960" y="382" text-anchor="middle" font-size="31" font-weight="700" fill="#23582e">Generic answer</text>
    <text x="960" y="424" text-anchor="middle" font-size="20" fill="#467451">technically plausible</text>
    <rect x="1185" y="330" width="250" height="130" rx="22" fill="#fff2f2" stroke="#cf5c5c" stroke-width="3"/>
    <text x="1310" y="382" text-anchor="middle" font-size="31" font-weight="700" fill="#6f2525">User correction</text>
    <text x="1310" y="424" text-anchor="middle" font-size="20" fill="#7c4b4b">same standard again</text>
    <path d="M390 395 H468" stroke="#526173" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
    <path d="M740 395 H818" stroke="#526173" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
    <path d="M1090 395 H1168" stroke="#526173" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
    <path d="M1310 476 C1310 610 260 610 260 480" stroke="#526173" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
  </g>
  <text x="800" y="675" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#172033">The fix is not more text in every prompt. The fix is reusable judgment criteria.</text>
</svg>
