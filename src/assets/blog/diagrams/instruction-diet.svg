<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI agent instruction diet concept diagram</title>
  <desc id="desc">A public-safe concept diagram that separates permanent rules, situational workflows, and enforceable checks.</desc>
  <rect width="1600" height="900" fill="#f5f7f8"/>
  <text x="110" y="145" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#102033">Instruction diet for AI agents</text>
  <text x="112" y="197" font-family="Arial, Helvetica, sans-serif" font-size="29" fill="#4b5563">Short rules stay loaded. Long procedures load when needed. Hard limits move into checks.</text>

  <rect x="130" y="285" width="380" height="355" rx="22" fill="#ffffff" stroke="#0f766e" stroke-width="4"/>
  <circle cx="192" cy="348" r="26" fill="#0f766e"/>
  <text x="177" y="358" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#ffffff">1</text>
  <text x="235" y="358" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Keep loaded</text>
  <text x="175" y="430" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#334155">tone</text>
  <text x="175" y="474" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#334155">safety boundary</text>
  <text x="175" y="518" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#334155">definition of done</text>
  <text x="175" y="562" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#334155">stop conditions</text>

  <rect x="610" y="285" width="380" height="355" rx="22" fill="#ffffff" stroke="#2563eb" stroke-width="4"/>
  <circle cx="672" cy="348" r="26" fill="#2563eb"/>
  <text x="657" y="358" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#ffffff">2</text>
  <text x="715" y="358" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Load on demand</text>
  <text x="655" y="430" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#334155">release checklist</text>
  <text x="655" y="474" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#334155">blog workflow</text>
  <text x="655" y="518" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#334155">review protocol</text>
  <text x="655" y="562" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#334155">domain playbook</text>

  <rect x="1090" y="285" width="380" height="355" rx="22" fill="#ffffff" stroke="#b45309" stroke-width="4"/>
  <circle cx="1152" cy="348" r="26" fill="#b45309"/>
  <text x="1137" y="358" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#ffffff">3</text>
  <text x="1195" y="358" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Enforce</text>
  <text x="1135" y="430" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#334155">schema</text>
  <text x="1135" y="474" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#334155">tests</text>
  <text x="1135" y="518" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#334155">secret scan</text>
  <text x="1135" y="562" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#334155">build gate</text>

  <path d="M522 462 H588" stroke="#475569" stroke-width="7" stroke-linecap="round"/>
  <path d="M578 442 L610 462 L578 482" fill="none" stroke="#475569" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1002 462 H1068" stroke="#475569" stroke-width="7" stroke-linecap="round"/>
  <path d="M1058 442 L1090 462 L1058 482" fill="none" stroke="#475569" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="210" y="750" font-family="Arial, Helvetica, sans-serif" font-size="31" fill="#111827">A longer prompt is not automatically a better control system.</text>
</svg>
