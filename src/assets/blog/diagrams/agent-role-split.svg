<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Codex and Claude role split concept diagram</title>
  <desc id="desc">A public-safe concept diagram showing a main implementation lane, an independent review lane, and a human decision gate.</desc>
  <rect width="1600" height="900" fill="#f7f4ef"/>
  <rect x="88" y="90" width="1424" height="720" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
  <text x="120" y="168" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#111827">AI coding agents need separate jobs</text>
  <text x="122" y="220" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#4b5563">One agent moves the work forward. Another checks assumptions. A person owns the decision.</text>

  <rect x="150" y="305" width="360" height="280" rx="20" fill="#e8f3ee" stroke="#2f6f5f" stroke-width="3"/>
  <text x="190" y="370" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#17483d">Codex lane</text>
  <text x="190" y="425" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#24483f">implement</text>
  <text x="190" y="465" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#24483f">edit files</text>
  <text x="190" y="505" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#24483f">run focused checks</text>

  <rect x="620" y="305" width="360" height="280" rx="20" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
  <text x="660" y="370" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#312e81">Claude lane</text>
  <text x="660" y="425" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#3730a3">challenge plan</text>
  <text x="660" y="465" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#3730a3">find gaps</text>
  <text x="660" y="505" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#3730a3">review tradeoffs</text>

  <rect x="1090" y="305" width="360" height="280" rx="20" fill="#fff7ed" stroke="#c2410c" stroke-width="3"/>
  <text x="1130" y="370" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#7c2d12">Human gate</text>
  <text x="1130" y="425" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#7c2d12">choose scope</text>
  <text x="1130" y="465" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#7c2d12">accept risk</text>
  <text x="1130" y="505" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#7c2d12">publish or stop</text>

  <path d="M520 445 H600" stroke="#374151" stroke-width="7" stroke-linecap="round"/>
  <path d="M590 425 L620 445 L590 465" fill="none" stroke="#374151" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M990 445 H1070" stroke="#374151" stroke-width="7" stroke-linecap="round"/>
  <path d="M1060 425 L1090 445 L1060 465" fill="none" stroke="#374151" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="230" y="668" width="1140" height="70" rx="35" fill="#111827"/>
  <text x="292" y="713" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#ffffff">Rule of thumb: do not ask one agent to both advocate and audit the same decision.</text>
</svg>
