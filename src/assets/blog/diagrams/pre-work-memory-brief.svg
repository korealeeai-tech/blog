<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">작업 전 메모리 브리프 개념도</title>
  <desc id="desc">짧은 메모리 브리프가 이전 선호를 작업 계약으로 바꾸는 흐름을 보여주는 공개용 개념도.</desc>
  <rect width="1600" height="900" fill="#fbfbf7"/>
  <text x="118" y="145" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#172033">작업 전 메모리 브리프</text>
  <text x="120" y="197" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="29" fill="#4b5563">메모리는 현재 근거를 대신하지 않고, 작업을 준비해야 한다.</text>

  <rect x="130" y="300" width="300" height="260" rx="24" fill="#e9f5f2" stroke="#0f766e" stroke-width="4"/>
  <text x="180" y="370" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#134e4a">기억 회수</text>
  <text x="178" y="427" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="25" fill="#134e4a">안정된 선호</text>
  <text x="178" y="468" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="25" fill="#134e4a">위험 패턴</text>
  <text x="178" y="509" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="25" fill="#134e4a">리뷰 방식</text>

  <rect x="520" y="300" width="300" height="260" rx="24" fill="#eef2ff" stroke="#4f46e5" stroke-width="4"/>
  <text x="570" y="370" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#312e81">브리프</text>
  <text x="568" y="427" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="25" fill="#312e81">의도</text>
  <text x="568" y="468" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="25" fill="#312e81">완료 기준</text>
  <text x="568" y="509" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="25" fill="#312e81">제외할 맥락</text>

  <rect x="910" y="300" width="300" height="260" rx="24" fill="#fff7ed" stroke="#c2410c" stroke-width="4"/>
  <text x="960" y="370" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#7c2d12">근거 확인</text>
  <text x="958" y="427" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="25" fill="#7c2d12">현재 파일</text>
  <text x="958" y="468" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="25" fill="#7c2d12">공식 출처</text>
  <text x="958" y="509" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="25" fill="#7c2d12">최신 출력</text>

  <rect x="1300" y="300" width="170" height="260" rx="24" fill="#111827"/>
  <text x="1342" y="388" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="#ffffff">실행</text>
  <text x="1330" y="446" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="23" fill="#e5e7eb">작성</text>
  <text x="1330" y="484" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="23" fill="#e5e7eb">검증</text>
  <text x="1330" y="522" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="23" fill="#e5e7eb">보고</text>

  <path d="M444 430 H496" stroke="#475569" stroke-width="7" stroke-linecap="round"/>
  <path d="M486 410 L520 430 L486 450" fill="none" stroke="#475569" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M834 430 H886" stroke="#475569" stroke-width="7" stroke-linecap="round"/>
  <path d="M876 410 L910 430 L876 450" fill="none" stroke="#475569" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1224 430 H1276" stroke="#475569" stroke-width="7" stroke-linecap="round"/>
  <path d="M1266 410 L1300 430 L1266 450" fill="none" stroke="#475569" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="258" y="670" width="1084" height="74" rx="37" fill="#263238"/>
  <text x="315" y="717" font-family="Noto Sans CJK KR, Arial, Helvetica, sans-serif" font-size="29" fill="#ffffff">좋은 브리프는 읽을 만큼 짧고, 확인할 만큼 구체적이다.</text>
</svg>
